# Nginx configuration for Maximo MCP Server
# Save this file to /etc/nginx/sites-available/mxm-mcp-server on your Ubuntu host
# Then enable it with: ln -s /etc/nginx/sites-available/mxm-mcp-server /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    server_name mxm-mcp-server.biendongpoc.vn;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Certbot challenge path (needed for Let's Encrypt validation)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name mxm-mcp-server.biendongpoc.vn;

    # SSL Certificates (Managed by certbot on the Ubuntu host)
    ssl_certificate /etc/letsencrypt/live/mxm-mcp-server.biendongpoc.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mxm-mcp-server.biendongpoc.vn/privkey.pem;

    # Modern SSL Protocols and Security Ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

    # Session configuration
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

    # Logging
    access_log /var/log/nginx/mxm-mcp-server.access.log;
    error_log /var/log/nginx/mxm-mcp-server.error.log warn;

    # Health check endpoint (bypass auth at proxy level if desired, or let app handle it)
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Secure MCP Endpoint Proxy
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket and connection-upgrade support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Standard headers to forward real IP information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Security tuning for Streamable HTTP / SSE:
        # We disable proxy buffering and proxy cache. This prevents Nginx from holding onto 
        # chunked/streaming data, allowing immediate and smooth end-to-end communication.
        proxy_buffering off;
        proxy_cache off;
        
        # Increase timeouts for long-running agent tool invocations
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        
        # Handle large payloads if querying big work order datasets
        client_max_body_size 20M;
    }
}
